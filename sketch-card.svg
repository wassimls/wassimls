  <text x="111" y="253" font-family="'DM Mono', monospace, sans-serif" font-size="9" fill="#A67C52" text-anchor="middle" letter-spacing="1.5">UI/UX DESIGNER</text>

  <rect x="178" y="238" width="100" height="22" rx="2" fill="none" stroke="#1D1D1F" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="228" y="253" font-family="'DM Mono', monospace, sans-serif" font-size="9" fill="#1D1D1F" text-anchor="middle" letter-spacing="1.5">FRONTEND DEV</text>

