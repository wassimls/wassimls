  <line x1="40" y1="278" x2="300" y2="278" stroke="#E0D8C8" stroke-width="1" opacity="0.8"/>

  <!-- Skills sketch list -->
  <text x="48" y="302" font-family="'DM Mono', monospace, sans-serif" font-size="10" fill="#A67C52" letter-spacing="1">◆</text>
  <text x="66" y="302" font-family="Georgia, serif" font-size="11" fill="#1D1D1F" letter-spacing="0.5">Figma  ·  Three.js  ·  GSAP</text>

  <text x="48" y="322" font-family="'DM Mono', monospace, sans-serif" font-size="10" fill="#A67C52" letter-spacing="1">◆</text>
  <text x="66" y="322" font-family="Georgia, serif" font-size="11" fill="#1D1D1F" letter-spacing="0.5">HTML  ·  CSS  ·  JavaScript</text>

  <text x="48" y="342" font-family="'DM Mono', monospace, sans-serif" font-size="10" fill="#A67C52" letter-spacing="1">◆</text>
