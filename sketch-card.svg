  <text x="170" y="385" font-family="Georgia, serif" font-style="italic" font-size="10.5" fill="#86868B" text-anchor="middle" letter-spacing="0.3">"Design is not decoration."</text>
  <text x="170" y="402" font-family="Georgia, serif" font-style="italic" font-size="10.5" fill="#86868B" text-anchor="middle" letter-spacing="0.3">"It is architecture."</text>

